name: Deploy Stream Proxy Worker

on:
  push:
    branches: [main]
    paths: ['proxy-worker/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only runs if the repository has CLOUDFLARE_API_TOKEN set
    if: ${{ vars.WORKER_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd proxy-worker && npm install

      - name: Validate wrangler.toml KV namespace ID
        run: |
          if grep -q 'REPLACE_WITH_KV_NAMESPACE_ID' proxy-worker/wrangler.toml; then
            echo "::error::wrangler.toml still contains placeholder KV namespace ID. Replace it before deploying."
            exit 1
          fi

      - name: Deploy to CloudFlare Workers
        run: cd proxy-worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
